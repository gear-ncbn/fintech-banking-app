# Render Blueprint for BankFlow (https://render.com/docs/blueprint-spec)
#
# Deploys two Docker services (Render caches Docker layers, so code-only
# redeploys reuse the dependency-install layers and are much faster):
#   - bankflow-backend: FastAPI app (in-memory mock DB, no external database)
#   - bankflow-frontend: Next.js app (App Router, standalone output)
#
# After the first deploy, wire the cross-service URLs:
#   - frontend NEXT_PUBLIC_API_URL / NEXT_PUBLIC_WS_URL -> backend public URL
#     (these are read at build time by Next.js; Render passes service env vars
#      to the Docker build as build args automatically)
#   - backend  CORS_ORIGINS                             -> frontend public URL
services:
  - type: web
    name: bankflow-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: USE_MOCK_DB
        value: "true"
      - key: ENVIRONMENT
        value: production
      - key: ENABLE_SWAGGER_UI
        value: "true"
      # Single uvicorn worker keeps memory within the free plan's 512MB limit.
      - key: WORKERS
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      # Set to the frontend public URL once it is known (comma-separated list).
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: bankflow-frontend
    runtime: docker
    rootDir: frontend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    region: oregon
    envVars:
      - key: NODE_ENV
        value: production
      # Baked into the client bundle at build time (Render passes it as a
      # Docker build arg). Set to the backend public URL once it is known.
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        sync: false
